default_install_hook_types:
  - pre-commit

repos:
  - repo: local
    hooks:
      - id: uv-lock
        name: uv lock
        entry: uv lock
        language: system
        pass_filenames: false
        always_run: true

      - id: uv-export-requirements
        name: uv export requirements.txt
        entry: uv export --frozen --format requirements.txt --no-hashes --no-dev --no-emit-project --output-file requirements.txt
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
